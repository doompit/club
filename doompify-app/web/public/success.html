<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>You crawled out — Doompify</title>
<link rel="icon" type="image/jpeg" href="/img/doomps-logo.jpeg" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,900&family=Space+Mono&family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
<div class="grain"></div>
<main class="stage" style="text-align:center;padding-top:130px;">
  <div class="sigil" style="color:var(--acid);">
    <svg viewBox="0 0 100 100" width="80" height="80">
      <circle cx="50" cy="50" r="46" fill="none" stroke="currentColor" stroke-width="1.5"/>
      <path d="M30 52 L45 66 L72 36" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <h1 class="title" style="margin-top:22px;">You crawled out.</h1>
  <p class="lede" id="msg" style="margin-top:16px;">Your wallets are linked and your roles are applied from pooled holdings.</p>
  <p class="colophon" style="margin-top:44px;">DOOMP IT.</p>
</main>
<script>
  try {
    const s = new URLSearchParams(location.search).get("s");
    if (s) {
      const json = JSON.parse(atob(s.split(".")[0].replace(/-/g,"+").replace(/_/g,"/")));
      const parts = [`${json.wallets} wallet(s) linked`];
      if (json.added) parts.push(`${json.added} role(s) granted`);
      if (json.conflicts && json.conflicts.length) parts.push(`${json.conflicts.length} already claimed by others`);
      document.getElementById("msg").textContent = parts.join(" · ") + ".";
    }
  } catch (_) {}
</script>
</body>
</html>
